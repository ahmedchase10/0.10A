version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: digischool_db
    restart: always
    environment:
      POSTGRES_USER: digischool
      POSTGRES_PASSWORD: digischool123
      POSTGRES_DB: digischool
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: digischool_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@school.tn
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata: